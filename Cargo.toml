# Cargo.toml

[package]
name = "cdqn"
version = "0.0.1"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
chrono = { version = "0.4", features = ["serde"] } # For timestamps
serde = { version = "1.0", features = ["derive"] } # For serialization
serde_json = "1.0" # For human-readable serialization (for now)
sha2 = "0.10" # For hashing content
ed25519-dalek = "2.1" # For cryptographic signatures
rand = "0.8" # For generating random data for keys
