# Cargo.toml

[package]
name = "cdqn"
version = "0.0.1"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# Serde is kept for the convenience of its derive macros, which is a compile-time dependency.
serde = { version = "1.0", features = ["derive"] }

# Cryptographic Primitives (Our "One Exception")
sha2 = "0.10"
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
rand = "0.8"
hex = "0.4"

# Bincode for efficient, sovereign binary serialization.
bincode = "1.3"

ureq = "2.9.6"
