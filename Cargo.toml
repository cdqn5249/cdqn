# File path: Cargo.toml

[package]
name = "cdqn"
version = "0.1.0"
edition = "2021"
description = "Causal Data Query Node implementation using immutable CDUs."
license = "MIT" # Placeholder license

[dependencies]
# Essential for defining the structure of the CDU payload
serde = { version = "1.0", features = ["derive"] } 

# Essential for content-addressing and Merkle Tree integrity
sha2 = "0.10" 

# Used for serializing the payload before hashing (required by hashing.rs)
bincode = "1.3" 

[lib]
# This tells Cargo that the main source file for the library is src/lib.rs
name = "cdqn"
path = "src/lib.rs"

[profile.dev]
opt-level = 1

[profile.release]
lto = true
codegen-units = 1
