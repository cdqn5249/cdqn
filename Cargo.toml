# cdqn/Cargo.toml
# File under the BaDaaS license, code generated by ai assistant: Gemini 2.5 Pro, Google

[workspace]
resolver = "2"
members = [
    "crates/cryptocore",
    "crates/hlc",
    "crates/cdu",
]

# Define shared metadata for all crates in the workspace to avoid repetition.
[workspace.package]
authors = ["Christophe Duy Quang Nguyen <contact@christophe-nguyen.com>"]
edition = "2021"
license = "BaDaaS"
version = "1.0.0"

# Define shared dependencies to ensure all crates use the same versions.
[workspace.dependencies]
# External Crate
serde = { version = "1.0", features = ["derive"] }

# Local Workspace Crates
cryptocore = { path = "crates/cryptocore" }
# --- CORRECTED PART ---
# By adding 'hlc' here, it can now be inherited by other crates.
hlc = { path = "crates/hlc" }
