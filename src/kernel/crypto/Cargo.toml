# File Path: /src/kernel/crypto/Cargo.toml

[package]
name = "k_crypto_core"
version = "0.1.0"
edition = "2021"
description = "The sovereign root of trust for the CDQN ecosystem."
license = "BaDaaS-1.0.0" # Placeholder for your custom license ID

[dependencies]
sha2 = "0.10"

# We now explicitly enable the "hazmat" feature, which makes the pre-hashing
# signature functions available to us. This is the required fix.
ed25519-dalek = { version = "2.1", features = ["rand_core", "hazmat"] }

rand_core = { version = "0.6", features = ["std"] }
