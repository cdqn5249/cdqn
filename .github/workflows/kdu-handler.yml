name: KDU Handler - Process Incoming Messages

on:
  push:
    branches:
      - main
    paths:
      # UPDATED PATH: This now points to the new exchange directory.
      - 'runtime/exchange/incoming-*.txt'
  workflow_dispatch:

jobs:
  process_incoming_message:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Find and process new incoming messages
        id: process_messages
        run: |
          # BaDaaS License: This script is governed by the BaDaaS license.
          NEW_RESPONSE_FILES=""
          # UPDATED PATH: The variable now points to the correct location.
          EXCHANGE_DIR="runtime/exchange"
          mkdir -p "$EXCHANGE_DIR"

          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "Processing push event from ${{ github.event.before }} to ${{ github.event.after }}"
            
            while read -r FILE; do
              if [ -f "$FILE" ]; then
                echo "Processing new file: $FILE"
                CONTENT=$(cat "$FILE")
                RESPONSE_FILE="$EXCHANGE_DIR/response-$(basename "$FILE" | sed 's/incoming-//')"
                
                echo "Status: PROCESSED" > "$RESPONSE_FILE"
                echo "Original Content: $CONTENT" >> "$RESPONSE_FILE"
                echo "Generated by: GitHub Actions" >> "$RESPONSE_FILE"
                echo "Response created: $RESPONSE_FILE"
                
                NEW_RESPONSE_FILES="$NEW_RESPONSE_FILES $RESPONSE_FILE"
              fi
            done < <(git diff --name-only --diff-filter=AM "${{ github.event.before }}" "${{ github.event.after }}" -- "$EXCHANGE_DIR/incoming-*.txt")
          
          else
            echo "Workflow manually dispatched. No files to process."
          fi
          
          echo "Final list of response files: $NEW_RESPONSE_FILES"
          echo "response_files=$NEW_RESPONSE_FILES" >> "$GITHUB_OUTPUT"

      - name: Commit and push response files
        if: steps.process_messages.outputs.response_files != ''
        run: |
          # BaDaaS License: This script is governed by the BaDaaS license.
          echo "Preparing to commit the following files: ${{ steps.process_messages.outputs.response_files }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add ${{ steps.process_messages.outputs.response_files }}
          
          git commit -m "Protocol: Response to incoming message(s)"
          
          echo "Pushing changes to the repository..."
          git push
          echo "Push complete."

      - name: Check and Purge Old Messages
        run: |
          # BaDaaS License: This script is governed by the BaDaaS license.
          # UPDATED PATH: The variable now points to the correct location.
          EXCHANGE_DIR="runtime/exchange"
          THRESHOLD=10
          
          FILE_COUNT=$(ls -1 $EXCHANGE_DIR | grep -E '^(incoming|response)-' | wc -l)
          
          echo "Found $FILE_COUNT message files. Threshold is $THRESHOLD."
          
          if [ "$FILE_COUNT" -ge "$THRESHOLD" ]; then
            echo "File count exceeds threshold. Purging old messages."
            rm -f $EXCHANGE_DIR/incoming-*.txt
            rm -f $EXCHANGE_DIR/response-*.txt
            
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            git add $EXCHANGE_DIR/
            
            if ! git diff --staged --quiet; then
              git commit -m "Housekeeping: Purge old messages from exchange"
              git push
            else
              echo "No files were deleted, nothing to commit."
            fi
          else
            echo "File count is below threshold. No purge needed."
          fi
