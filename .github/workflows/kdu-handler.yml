# .github/workflows/kdu-handler.yml

name: CDQN KDU Handler

on:
  workflow_dispatch:
    inputs:
      # ... (inputs are unchanged)

jobs:
  # ... (process_and_respond job is unchanged)

  commit_to_pages:
    name: Commit KDUs and Regenerate Index
    runs-on: ubuntu-latest
    needs: process_and_respond
    steps:
      - name: 1. Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: 'gh-pages'
          token: ${{ github.event.inputs.github_token }}

      - name: 2. Create Log and KDU files
        run: |
          # Start a detailed log file
          LOG_FILE=handler_log_$(date +%s).txt
          echo "--- CDQN KDU Handler Workflow Log ---" > $LOG_FILE
          echo "Timestamp: $(date -u)" >> $LOG_FILE
          echo "Triggering Commit: ${{ github.sha }}" >> $LOG_FILE
          
          echo "\n--- Files on gh-pages branch before changes ---" >> $LOG_FILE
          ls -laR ./ >> $LOG_FILE

          # Decode and write KDU files
          echo "${{ github.event.inputs.ping_kdu_base64 }}" | base64 --decode > ${{ github.event.inputs.ping_kdu_filename }}
          echo "${{ needs.process_and_respond.outputs.pong_kdu_base64 }}" | base64 --decode > ${{ needs.process_and_respond.outputs.pong_kdu_filename }}
          
          echo "\n--- Files after creating KDUs ---" >> $LOG_FILE
          ls -laR ./ >> $LOG_FILE
          echo "\n--- Log End ---" >> $LOG_FILE

      - name: 3. Commit and push all changes
        run: |
          git config --global user.name 'CDQN Handler Bot'
          git config --global user.email 'actions@github.com'
          git pull
          git add .
          git commit -m "handler: Add KDUs and log file"
          git push
