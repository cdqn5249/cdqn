# .github/workflows/kdu-handler.yml
name: KDU Handler - Process Incoming Messages

on:
  push:
    branches:
      - main # Or your alpha-test branch if you're using one
    paths:
      - 'kdu-exchange/incoming-*.txt' # Only trigger if a file matching this pattern is pushed in kdu-exchange/
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  process_incoming_message:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grant write permission for committing responses
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history to find new files

      - name: Find and process new incoming messages
        id: process_messages
        run: |
          NEW_FILES=""
          # Define the exchange directory
          EXCHANGE_DIR="kdu-exchange"
          mkdir -p "$EXCHANGE_DIR" # Ensure directory exists in runner workspace

          # Check if the workflow was triggered by a push event
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Find files pushed in the current commit that match the pattern in the exchange directory
            git diff --name-only HEAD~1 HEAD | grep "$EXCHANGE_DIR/incoming-.*\.txt$" | while read -r FILE; do
              if [ -f "$FILE" ]; then
                echo "Processing new file: $FILE"
                CONTENT=$(cat "$FILE")
                # Response file will be in the same kdu-exchange directory
                RESPONSE_FILE="$EXCHANGE_DIR/response-$(basename "$FILE" | sed 's/incoming-//')"
                echo "Status: PROCESSED" > "$RESPONSE_FILE"
                echo "Original Content: $CONTENT" >> "$RESPONSE_FILE"
                echo "Generated by: GitHub Actions" >> "$RESPONSE_FILE"
                echo "Response created: $RESPONSE_FILE"
                NEW_FILES="$NEW_FILES $RESPONSE_FILE"
              fi
            done
          else # Workflow was manually dispatched (workflow_dispatch)
            echo "Workflow manually dispatched. No specific incoming files to process automatically."
            # For manual dispatch, you might later add inputs to specify which file to process
            # For now, it will just run without processing a file if no specific input is given.
          fi
          echo "NEW_FILES=$NEW_FILES" >> "$GITHUB_OUTPUT"


      - name: Commit and push response files
        if: steps.process_messages.outputs.NEW_FILES != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ steps.process_messages.outputs.NEW_FILES }}
          git commit -m "Protocol: Response to incoming message"
          git push
