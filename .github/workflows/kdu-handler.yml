# .github/workflows/kdu-handler.yml
name: KDU Handler - Process Incoming Messages

on:
  push:
    branches:
      - main # Or your alpha-test branch if you're using one
    paths:
      - 'kdu-exchange/incoming-*.txt' # Only trigger if a file matching this pattern is pushed
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  process_incoming_message:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grant write permission for committing responses
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Provide a token with write permissions to allow pushing back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch entire history to ensure we can diff between any two commits
          fetch-depth: 0

      - name: Find and process new incoming messages
        id: process_messages
        run: |
          # Use an output variable to collect the names of new response files
          NEW_RESPONSE_FILES=""
          EXCHANGE_DIR="kdu-exchange"

          # Ensure the target directory exists in the runner's workspace
          mkdir -p "$EXCHANGE_DIR"

          # This block handles the robust logic for a push event
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "Processing push event from ${{ github.event.before }} to ${{ github.event.after }}"

            # Use git diff with the specific SHAs from the event payload.
            # This correctly handles pushes with one or multiple commits.
            # It finds all files matching the pattern that were added or modified.
            git diff --name-only --diff-filter=AM "${{ github.event.before }}" "${{ github.event.after }}" -- "$EXCHANGE_DIR/incoming-*.txt" | while read -r FILE; do
              if [ -f "$FILE" ]; then
                echo "Processing new file: $FILE"
                CONTENT=$(cat "$FILE")
                
                # Generate a corresponding response file name
                RESPONSE_FILE="$EXCHANGE_DIR/response-$(basename "$FILE" | sed 's/incoming-//')"
                
                # Create the response file content
                echo "Status: PROCESSED" > "$RESPONSE_FILE"
                echo "Original Content: $CONTENT" >> "$RESPONSE_FILE"
                echo "Generated by: GitHub Actions" >> "$RESPONSE_FILE"
                echo "Response created: $RESPONSE_FILE"
                
                # Add the new response file to our list for the commit step
                NEW_RESPONSE_FILES="$NEW_RESPONSE_FILES $RESPONSE_FILE"
              fi
            done
          else
            # This block handles a manual trigger
            echo "Workflow manually dispatched. No files to process."
          fi
          
          # Set the output for the next step
          echo "response_files=$NEW_RESPONSE_FILES" >> "$GITHUB_OUTPUT"

      - name: Commit and push response files
        # This step only runs if the 'response_files' output is not empty
        if: steps.process_messages.outputs.response_files != ''
        run: |
          # Configure git with bot credentials
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add only the newly created response files to the staging area
          # The trim function removes leading/trailing whitespace
          git add ${{ steps.process_messages.outputs.response_files }}
          
          # Commit the changes
          git commit -m "Protocol: Response to incoming message(s)"
          
          # Push the commit to the repository
          echo "Pushing changes to the repository..."
          git push
          echo "Push complete."
