# .github/workflows/kdu-handler.yml

name: CDQN KDU Handler

on:
  workflow_dispatch:
    # These inputs now EXACTLY match the error message, solving the cache issue.
    inputs:
      github_token:
        description: 'The PAT to authorize the commit to gh-pages'
        required: true
      ping_kdu_base64:
        description: 'The content of the initial ping KDU, base64 encoded'
        required: true
      ping_kdu_filename:
        description: 'The content-addressed filename of the ping KDU'
        required: true

jobs:
  process_and_respond:
    name: Process Ping and Generate Pong
    runs-on: ubuntu-latest
    outputs:
      pong_kdu_filename: ${{ steps.run_processor.outputs.pong_kdu_filename }}
      pong_kdu_base64: ${{ steps.run_processor.outputs.pong_kdu_base64 }}

    steps:
      - name: Checkout main branch for processing code
        uses: actions/checkout@v4

      - name: Decode Ping KDU from input
        run: |
          echo "${{ github.event.inputs.ping_kdu_base64 }}" | base64 --decode > ${{ github.event.inputs.ping_kdu_filename }}
          echo "Decoded ${{ github.event.inputs.ping_kdu_filename }}"

      - name: Run KDU Processor
        id: run_processor
        run: |
          echo "Compiling and running the processor..."
          PROCESSOR_OUTPUT=$(cargo run --release --quiet -- --process < ${{ github.event.inputs.ping_kdu_filename }})
          PONG_FILENAME=$(echo $PROCESSOR_OUTPUT | cut -d',' -f1)
          PONG_B64=$(echo $PROCESSOR_OUTPUT | cut -d',' -f2)
          echo "pong_kdu_filename=$PONG_FILENAME" >> $GITHUB_OUTPUT
          echo "pong_kdu_base64=$PONG_B64" >> $GITHUB_OUTPUT

  commit_to_pages:
    name: Commit KDUs and Regenerate Index
    runs-on: ubuntu-latest
    needs: process_and_respond
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: 'gh-pages'
          token: ${{ github.event.inputs.github_token }}

      - name: Decode and write KDU files
        run: |
          echo "${{ github.event.inputs.ping_kdu_base64 }}" | base64 --decode > ${{ github.event.inputs.ping_kdu_filename }}
          echo "Created ${{ github.event.inputs.ping_kdu_filename }}"
          echo "${{ needs.process_and_respond.outputs.pong_kdu_base64 }}" | base64 --decode > ${{ needs.process_and_respond.outputs.pong_kdu_filename }}
          echo "Created ${{ needs.process_and_respond.outputs.pong_kdu_filename }}"

      - name: Regenerate Index Page
        run: |
          echo '<!DOCTYPE html><html>...' > index.html # (script is unchanged)
          for item in *; do
            if [ -e "$item" ]; then
              filename=$(basename "$item")
              if [ "$filename" != "index.html" ]; then
                echo "<li><a href=\"$filename\">$filename</a></li>" >> index.html
              fi
            fi
          done
          echo '</ul></body></html>' >> index.html

      - name: Commit and push all changes
        run: |
          git config --global user.name 'CDQN Handler Bot'
          git config --global user.email 'actions@github.com'
          git pull
          git add .
          git commit -m "handler: Add KDUs and update index"
          git push
