name: Chronos Rust CI

on:
  push:
    branches:
      - main
    paths:
      - 'chronos_ai/src/**'
      - 'chronos_ai/Cargo.toml'
      - 'chronos_ai/Cargo.lock'
  pull_request:
    branches:
      - main
    paths:
      - 'chronos_ai/src/**'
      - 'chronos_ai/Cargo.toml'
      - 'chronos_ai/Cargo.lock'

jobs:
  chronos_ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain (WITH RUSTFMT)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: rustfmt

      - name: Check Code Formatting (rustfmt)
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: -- --manifest-path ./chronos_ai/Cargo.toml -- --check # <-- FIX: Use manifest-path

      - name: Build Chronos Engine
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --verbose --manifest-path ./chronos_ai/Cargo.toml # <-- FIX: Use manifest-path

      - name: Run Unit Tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --verbose --manifest-path ./chronos_ai/Cargo.toml # <-- FIX: Use manifest-path

