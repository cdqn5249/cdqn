name: Chronos Rust CI

on:
  push:
    branches:
      - main # Trigger on push to the main branch
    paths:
      - '/**'
      - 'chronos_ai/Cargo.toml'
      - 'chronos_ai/Cargo.lock'
  pull_request:
    branches:
      - main
    paths:
      - '/**'
      - 'chronos_ai/Cargo.toml'
      - 'chronos_ai/Cargo.lock'

jobs:
  chronos_ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./chronos_ai # Set the working directory for all steps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Check Code Formatting (rustfmt)
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: -- --check # Checks if code is formatted correctly

      - name: Build Chronos Engine
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --verbose

      - name: Run Unit Tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --verbose

