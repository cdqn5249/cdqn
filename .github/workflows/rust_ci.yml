name: Chronos Rust CI

on:
  push:
    branches:
      - main
    
  pull_request:
    branches:
      - main

jobs:
  chronos_ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./chronos_ai # CRITICAL: Run all cargo commands from the project root
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Check Code Formatting (rustfmt)
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: -- --check

      - name: Build Chronos Engine
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --verbose

      - name: Run Unit Tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --verbose

