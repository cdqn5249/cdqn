# .github/workflows/kdu-processor.yml

name: CDQN KDU Processor

on:
  # This workflow triggers whenever a change is pushed to the gh-pages branch.
  push:
    branches:
      - 'gh-pages'

jobs:
  process_kdu:
    name: Process Inbound KDU
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the gh-pages branch to get the new KDU file.
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: 'gh-pages'

      # 2. Identify the new KDU file from the last commit.
      - name: Identify new KDU file
        id: get_kdu
        run: |
          # Use git diff to find the file added in the last commit.
          # Filter for .kdu files and handle the case where no file is found.
          KDU_FILE=$(git diff --name-only HEAD~1 HEAD | grep '.kdu$' || echo "")
          if [ -z "$KDU_FILE" ]; then
            echo "No new .kdu file found in the last commit. Exiting."
            exit 0
          fi
          echo "Found new KDU file: $KDU_FILE"
          # Set the filename as an output for the next step.
          echo "kdu_file=$KDU_FILE" >> $GITHUB_OUTPUT

      # 3. If a KDU was found, check out the main branch to get our Rust code.
      - name: Checkout main branch for processing code
        if: steps.get_kdu.outputs.kdu_file
        uses: actions/checkout@v4
        with:
          path: 'main' # Check out to a subdirectory to avoid conflicts

      # 4. Run the processor
      - name: Run KDU Processor
        if: steps.get_kdu.outputs.kdu_file
        run: |
          cd main
          echo "Compiling and running the processor..."
          # Run our executable in the new --process mode, passing the KDU content.
          cargo run --release -- --process < ../${{ steps.get_kdu.outputs.kdu_file }}
