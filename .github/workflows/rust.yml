name: Build and Check Workspace

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Rust stable toolchain
      uses: dtolnay/rust-toolchain@stable

    # --- THIS IS THE NEW TOOLING SETUP ---
    - name: Install cargo-component
      uses: bytecodealliance/cargo-component-action@v1

    - name: Build the entire workspace with cargo-component
      # We use `cargo component build` instead of `cargo build`.
      run: cargo component build --workspace --verbose

    - name: Run tests for the entire workspace
      run: cargo test --workspace --verbose
