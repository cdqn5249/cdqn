name: Build and Check Workspace

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Rust stable toolchain
      uses: dtolnay/rust-toolchain@stable

    # --- THIS IS THE CORRECTED STEP ---
    # We use the standard `cargo install` command to add the tool.
    - name: Install cargo-component
      run: cargo install cargo-component --locked

    - name: Build the entire workspace with cargo-component
      # This command remains the same and is correct.
      run: cargo component build --workspace --verbose

    - name: Run tests for the entire workspace
      run: cargo test --workspace --verbose
