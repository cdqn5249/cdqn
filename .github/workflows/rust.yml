name: Build and Check Workspace

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Build the entire workspace
      run: cargo build --workspace --verbose

    - name: Run tests for the entire workspace
      run: cargo test --workspace --verbose
