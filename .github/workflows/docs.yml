name: Deploy GH-Pages (UI + Repo Mirror)

on:
  push:
    branches:
      - main # Or your alpha-test branch if you're using one
    # This workflow will run on every push to main to keep the mirror updated
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push to gh-pages branch
      pages: write    # Required to deploy to GitHub Pages
      id-token: write # Required for OIDC authentication
    env:
      GITHUB_REPO_URL: https://github.com/${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history to get all files/dirs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare deployment directory and generate mirror indexes
        run: |
          # Create the main _site directory for deployment
          mkdir -p _site

          # 1. Copy the contents of webGhPages to the root of _site
          # This makes webGhPages/index.html the main entry point
          cp -r webGhPages/* _site/ || true

          # 2. Copy the main LICENSE.md to the root of _site for easy access from UI
          cp LICENSE.md _site/

          # 3. Create a subdirectory for the repository mirror
          mkdir -p _site/repo-mirror

          # 4. Copy the *contents* of the rest of the repository into _site/repo-mirror/
          # Exclude .git, .github, webGhPages, and the _site directory itself
          mkdir -p _temp_repo_content
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='webGhPages/' \
            --exclude='_site/' \
            --exclude='_temp_repo_content/' \
            ./ _temp_repo_content/ # Copy contents of current dir to temp
          cp -r _temp_repo_content/* _site/repo-mirror/ || true # Copy contents from temp to mirror
          rm -rf _temp_repo_content # Clean up temp directory

          # --- Generate index.html for the root of the mirror (_site/repo-mirror/) ---
          MIRROR_ROOT="_site/repo-mirror"
          echo "<html><head><title>CDQN Repository Mirror</title><style>body{font-family:sans-serif;}</style></head><body>" > "$MIRROR_ROOT/index.html"
          echo "<h1>CDQN Repository Mirror</h1>" >> "$MIRROR_ROOT/index.html"
          echo "<p><a href=\"../\">Back to Main UI</a></p>" >> "$MIRROR_ROOT/index.html" # Link back to the main UI
          echo "<h2>Files:</h2><ul>" >> "$MIRROR_ROOT/index.html"

          # List files directly in the mirror root, excluding the generated index.html
          find "$MIRROR_ROOT" -maxdepth 1 -type f -not -name "index.html" | sort | while read -r file; do
            FILENAME=$(basename "$file")
            # Construct the permanent GitHub link for the file
            GITHUB_FILE_LINK="${GITHUB_REPO_URL}/blob/${GITHUB_SHA}/${FILENAME}"
            echo "<li><a href=\"$FILENAME\">$FILENAME</a> (<a href=\"$GITHUB_FILE_LINK\">View Source on GitHub</a>)</li>" >> "$MIRROR_ROOT/index.html"
          done
          echo "</ul>" >> "$MIRROR_ROOT/index.html"

          echo "<h2>Directories:</h2><ul>" >> "$MIRROR_ROOT/index.html"
          # List directories directly in the mirror root, excluding the mirror root itself ('.')
          find "$MIRROR_ROOT" -maxdepth 1 -type d -not -name "$MIRROR_ROOT" | sort | while read -r dir; do
            DIRNAME=$(basename "$dir")
            # Exclude any temporary directories from the listing
            if [[ "$DIRNAME" != "_site" && "$DIRNAME" != "_temp_repo_content" && "$DIRNAME" != "repo-mirror" ]]; then
              # Construct the permanent GitHub link for the directory
              GITHUB_DIR_LINK="${GITHUB_REPO_URL}/tree/${GITHUB_SHA}/${DIRNAME}"
              echo "<li><a href=\"$DIRNAME/\">$DIRNAME/</a> (<a href=\"$GITHUB_DIR_LINK\">Browse on GitHub</a>)</li>" >> "$MIRROR_ROOT/index.html"
            fi
          done
          echo "</ul>" >> "$MIRROR_ROOT/index.html"
          echo "<hr><p>This content is governed by the <a href=\"LICENSE.md\">BaDaaS License</a>.</p>" >> "$MIRROR_ROOT/index.html"
          echo "</body></html>" >> "$MIRROR_ROOT/index.html"

          # --- Generate index.html for all subdirectories within the mirror ---
          # Iterate over all directories within _site/repo-mirror (excluding its root)
          find "$MIRROR_ROOT" -type d -not -path "$MIRROR_ROOT" | while read -r dir_path; do
            # Calculate the path relative to the _site/repo-mirror root for display in the title
            RELATIVE_DISPLAY_PATH=$(echo "$dir_path" | sed "s#^$MIRROR_ROOT/##")
            if [ -z "$RELATIVE_DISPLAY_PATH" ]; then
              RELATIVE_DISPLAY_PATH="."
            fi

            # Calculate relative path to LICENSE.md from current directory
            DEPTH=$(echo "$RELATIVE_DISPLAY_PATH" | grep -o "/" | wc -l)
            LICENSE_RELATIVE_PATH=""
            for i in $(seq 1 $DEPTH); do
              LICENSE_RELATIVE_PATH="../$LICENSE_RELATIVE_PATH"
            done
            LICENSE_RELATIVE_PATH="${LICENSE_RELATIVE_PATH}LICENSE.md"

            echo "Generating index.html for directory: $dir_path"
            echo "<html><head><title>CDQN Mirror - $RELATIVE_DISPLAY_PATH</title><style>body{font-family:sans-serif;}</style></head><body>" > "$dir_path/index.html"
            echo "<h1>Contents of $RELATIVE_DISPLAY_PATH/</h1>" >> "$dir_path/index.html"
            echo "<h2>Files:</h2><ul>" >> "$dir_path/index.html"

            # List files in the current subdirectory
            find "$dir_path" -maxdepth 1 -type f -not -name "index.html" | sort | while read -r file_in_dir; do
              FILENAME=$(basename "$file_in_dir")
              # Construct the permanent GitHub link for the file
              GITHUB_FILE_LINK="${GITHUB_REPO_URL}/blob/${GITHUB_SHA}/${RELATIVE_DISPLAY_PATH}/${FILENAME}"
              echo "<li><a href=\"$FILENAME\">$FILENAME</a> (<a href=\"$GITHUB_FILE_LINK\">View Source on GitHub</a>)</li>" >> "$dir_path/index.html"
            done
            echo "</ul>" >> "$dir_path/index.html"

            echo "<h2>Directories:</h2><ul>" >> "$dir_path/index.html"
            # List subdirectories in the current subdirectory, excluding '.' and '..'
            find "$dir_path" -maxdepth 1 -mindepth 1 -type d | sort | while read -r subdir_in_dir; do
              SUBDIRNAME=$(basename "$subdir_in_dir")
              # Construct the permanent GitHub link for the directory
              GITHUB_DIR_LINK="${GITHUB_REPO_URL}/tree/${GITHUB_SHA}/${RELATIVE_DISPLAY_PATH}/${SUBDIRNAME}"
              echo "<li><a href=\"$SUBDIRNAME/\">$SUBDIRNAME/</a> (<a href=\"$GITHUB_DIR_LINK\">Browse on GitHub</a>)</li>" >> "$dir_path/index.html"
            done
            echo "</ul>" >> "$dir_path/index.html"
            echo "<p><a href=\"../\">Back to Parent Directory</a></p>" >> "$dir_path/index.html" # Add a back link
            echo "<hr><p>This content is governed by the <a href=\"$LICENSE_RELATIVE_PATH\">BaDaaS License</a>.</p>" >> "$dir_path/index.html"
            echo "</body></html>" >> "$dir_path/index.html"
          done

          # --- Debugging step: List the contents of _site directory to verify structure ---
          echo "--- Contents of _site directory before upload ---"
          ls -R _site
          echo "-------------------------------------------------"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site' # Upload the entire _site directory as the artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
