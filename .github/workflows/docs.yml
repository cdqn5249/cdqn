# .github/workflows/docs.yml

name: CDQN Documentation

on:
  push:
    branches:
      - main

jobs:
  deploy_docs:
    name: Deploy Docs to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust Documentation
        run: cargo doc --no-deps --all-features

      - name: Build and Organize Final Documentation Site
        run: |
          cp Docs/*.md ./target/doc/
          cp README.md ./target/doc/
          
          echo '<!DOCTYPE html>
          <html>
          <head>
            <title>CDQN Project Documentation</title>
            <meta charset="utf-8">
            <style>
              body { font-family: sans-serif; margin: 2em; }
              h1, h2 { color: #333; }
              ul { list-style-type: none; padding: 0; }
              li { margin: 0.5em 0; }
              a { text-decoration: none; color: #0066cc; }
              a:hover { text-decoration: underline; }
              .section { border-top: 1px solid #ccc; padding-top: 1em; margin-top: 2em; }
            </style>
          </head>
          <body>
            <h1>CDQN Project Documentation</h1>
            
            <div class="section">
              <h2>Rust API Documentation</h2>
              <ul>
                <li><a href="cdqn/index.html">API Reference (cargo doc)</a></li>
              </ul>
            </div>

            <div class="section">
              <h2>Design & Planning Documents</h2>
              <ul>' > ./target/doc/index.html

          # --- THIS IS THE CORRECTED LOOP ---
          # It now looks for both .md and .kdu files.
          for file in ./target/doc/*.md ./target/doc/*.kdu; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              echo "                <li><a href=\"$filename\">$filename</a></li>" >> ./target/doc/index.html
            fi
          done

          echo '              </ul>
            </div>
          </body>
          </html>' >> ./target/doc/index.html

      - name: List generated files for debugging
        run: ls -R ./target/doc

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          keep_files: true
