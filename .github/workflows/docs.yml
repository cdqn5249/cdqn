name: Deploy GH-Pages (UI + Repo Tree Mirror)

on:
  push:
    branches:
      - main # Or your alpha-test branch if you're using one
    # This workflow will run on every push to main to keep the mirror updated
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push to gh-pages branch
      pages: write    # Required to deploy to GitHub Pages
      id-token: write # Required for OIDC authentication
    env:
      GITHUB_REPO_URL: https://github.com/${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history to get all files/dirs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare deployment directory and generate mirror tree index
        run: |
          # Create the main _site directory for deployment
          mkdir -p _site

          # 1. Copy the contents of webGhPages to the root of _site
          # This makes webGhPages/index.html the main entry point
          cp -r webGhPages/* _site/ || true

          # 2. Copy the main LICENSE.md to the root of _site for easy access from UI
          cp LICENSE.md _site/

          # 3. Create a subdirectory for the repository mirror
          mkdir -p _site/repo-mirror

          # 4. Copy the *contents* of the rest of the repository into _site/repo-mirror/
          # Exclude .git, .github, webGhPages, and the _site directory itself
          mkdir -p _temp_repo_content
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='webGhPages/' \
            --exclude='_site/' \
            --exclude='_temp_repo_content/' \
            ./ _temp_repo_content/ # Copy contents of current dir to temp
          cp -r _temp_repo_content/* _site/repo-mirror/ || true # Copy contents from temp to mirror
          rm -rf _temp_repo_content # Clean up temp directory

          # --- Generate a single, comprehensive index.html for the mirror (_site/repo-mirror/) ---
          MIRROR_ROOT="_site/repo-mirror"
          INDEX_FILE="$MIRROR_ROOT/index.html"

          echo "<html><head><title>CDQN Repository Tree Mirror</title><style>body{font-family:sans-serif;}</style></head><body>" > "$INDEX_FILE"
          echo "<h1>CDQN Repository Tree Mirror</h1>" >> "$INDEX_FILE"
          echo "<p><a href=\"../\">Back to Main UI</a></p>" >> "$INDEX_FILE" # Link back to the main UI
          echo "<h2>Repository Tree:</h2>" >> "$INDEX_FILE"

          # Initialize HTML list structure
          echo "<ul>" >> "$INDEX_FILE"
          echo "<li>📁 ./ (<a href=\"${GITHUB_REPO_URL}/tree/${GITHUB_SHA}/\">Browse on GitHub</a>)" >> "$INDEX_FILE"

          # Track current depth for nested lists
          current_depth=0
          # Array to keep track of open <ul> tags, for proper closing
          declare -a open_ul_tags

          # Find all items, remove the MIRROR_ROOT prefix, sort them
          find "$MIRROR_ROOT" -mindepth 1 -print | sort | sed "s#^$MIRROR_ROOT/##" | while read -r item; do
            if [ -z "$item" ]; then continue; fi # Skip empty lines

            # Calculate depth of current item
            item_depth=$(echo "$item" | grep -o "/" | wc -l)

            # Close tags if moving up the hierarchy
            while (( current_depth >= item_depth )); do
              if (( ${#open_ul_tags[@]} > 0 )); then
                echo "</ul></li>" >> "$INDEX_FILE"
                unset 'open_ul_tags[${#open_ul_tags[@]}-1]' # Pop from stack
              else
                # This should ideally not happen if logic is perfect, but as a safeguard
                break
              fi
              (( current_depth-- ))
            done

            # Open new tags if moving down the hierarchy
            while (( current_depth < item_depth - 1 )); do
              echo "<li><ul>" >> "$INDEX_FILE"
              open_ul_tags+=("<li><ul>") # Push to stack
              (( current_depth++ ))
            done

            # Determine if it's a file or directory
            FULL_PATH="$MIRROR_ROOT/$item"
            if [ -f "$FULL_PATH" ]; then
              # It's a file
              GITHUB_FILE_LINK="${GITHUB_REPO_URL}/blob/${GITHUB_SHA}/${item}"
              echo "<li>📄 $item (<a href=\"$GITHUB_FILE_LINK\">View Source on GitHub</a>)</li>" >> "$INDEX_FILE"
            elif [ -d "$FULL_PATH" ]; then
              # It's a directory
              GITHUB_DIR_LINK="${GITHUB_REPO_URL}/tree/${GITHUB_SHA}/${item}"
              echo "<li>📁 $item/ (<a href=\"$GITHUB_DIR_LINK\">Browse on GitHub</a>)" >> "$INDEX_FILE" # Directory, so it might contain a sub-list
            fi
            current_depth=$item_depth # Update current depth
          done

          # Close any remaining open ul/li tags at the end
          while (( ${#open_ul_tags[@]} > 0 )); do
            echo "</ul></li>" >> "$INDEX_FILE"
            unset 'open_ul_tags[${#open_ul_tags[@]}-1]'
          done
          echo "</ul>" >> "$INDEX_FILE" # Close the very first <ul>

          echo "<hr><p>This content is governed by the <a href=\"LICENSE.md\">BaDaaS License</a>.</p>" >> "$INDEX_FILE"
          echo "</body></html>" >> "$INDEX_FILE"

          # --- Debugging step: List the contents of _site directory to verify structure ---
          echo "--- Contents of _site directory before upload ---"
          ls -R _site
          echo "-------------------------------------------------"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site' # Upload the entire _site directory as the artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
