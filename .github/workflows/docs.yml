name: Deploy GH-Pages (UI + Repo Tree Mirror)

on:
  push:
    branches:
      - main # Or your alpha-test branch if you're using one
    # This workflow will run on every push to main to keep the mirror updated
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push to gh-pages branch
      pages: write    # Required to deploy to GitHub Pages
      id-token: write # Required for OIDC authentication
    env:
      GITHUB_REPO_URL: https://github.com/${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}
      # Define the awk script as a multi-line environment variable
      AWK_SCRIPT_CONTENT: |
        BEGIN {
            current_depth = 0;
            print "<ul>"; # Start the main list
            print "<li>📁 ./ (<a href=\"" GITHUB_REPO_URL "/tree/" GITHUB_SHA "/\">Browse on GitHub</a>)";
        }
        {
            # Skip empty lines or temporary build directories
            if ($0 == "" || $0 ~ /^_site/ || $0 ~ /^_temp_repo_content/) {
                next;
            }

            # Count slashes to determine depth
            item_depth = split($0, path_parts, "/");

            # Adjust nesting: close <ul> and <li> tags if moving up the hierarchy
            while (current_depth >= item_depth) {
                print "</ul></li>";
                current_depth--;
            }

            # Open new <ul> and <li> tags if moving down the hierarchy
            while (current_depth < item_depth - 1) {
                print "<li><ul>"; # Open a new list item and a new sub-list
                current_depth++;
            }

            # Determine if it's a file or directory
            full_path = MIRROR_ROOT_PATH "/" $0;
            if (system("test -f \"" full_path "\"") == 0) {
                # It's a file
                filename = path_parts[item_depth];
                github_file_link = GITHUB_REPO_URL "/blob/" GITHUB_SHA "/" $0;
                print "<li>📄 " filename " (<a href=\"" github_file_link "\">View Source on GitHub</a>)</li>";
            } else if (system("test -d \"" full_path "\"") == 0) {
                # It's a directory
                dirname = path_parts[item_depth];
                github_dir_link = GITHUB_REPO_URL "/tree/" GITHUB_SHA "/" $0;
                print "<li>📁 " dirname "/ (<a href=\"" github_dir_link "\">Browse on GitHub</a>)"; # Directory, so it might contain a sub-list
            }
            current_depth = item_depth; # Update current depth after processing item
        }
        END {
            # Close any remaining open ul/li tags
            while (current_depth >= 0) { # Need to close the initial <li> and <ul>
                print "</ul></li>";
                current_depth--;
            }
            print "</ul>"; # Close the very first <ul>
        }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history to get all files/dirs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare deployment directory and generate mirror tree index
        run: |
          # Create the main _site directory for deployment
          mkdir -p _site

          # 1. Copy the contents of webGhPages to the root of _site
          # This makes webGhPages/index.html the main entry point
          cp -r webGhPages/* _site/ || true

          # 2. Copy the main LICENSE.md to the root of _site for easy access from UI
          cp LICENSE.md _site/

          # 3. Create a subdirectory for the repository mirror
          mkdir -p _site/repo-mirror

          # 4. Copy the *contents* of the rest of the repository into _site/repo-mirror/
          # Exclude .git, .github, webGhPages, and the _site directory itself
          mkdir -p _temp_repo_content
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='webGhPages/' \
            --exclude='_site/' \
            --exclude='_temp_repo_content/' \
            ./ _temp_repo_content/ # Copy contents of current dir to temp
          cp -r _temp_repo_content/* _site/repo-mirror/ || true # Copy contents from temp to mirror
          rm -rf _temp_repo_content # Clean up temp directory

          # --- Generate a single, comprehensive index.html for the mirror (_site/repo-mirror/) ---
          MIRROR_ROOT="_site/repo-mirror"
          echo "<html><head><title>CDQN Repository Tree Mirror</title><style>body{font-family:sans-serif;}</style></head><body>" > "$MIRROR_ROOT/index.html"
          echo "<h1>CDQN Repository Tree Mirror</h1>" >> "$MIRROR_ROOT/index.html"
          echo "<p><a href=\"../\">Back to Main UI</a></p>" >> "$MIRROR_ROOT/index.html" # Link back to the main UI
          echo "<h2>Repository Tree:</h2>" >> "$MIRROR_ROOT/index.html"

          # Generate the full tree structure with permanent GitHub links and nested bullets
          # Find all items, remove the MIRROR_ROOT prefix, sort them, then process with awk
          find "$MIRROR_ROOT" -mindepth 1 -print | sort | sed "s#^$MIRROR_ROOT/##" | \
          awk -v GITHUB_REPO_URL="${GITHUB_REPO_URL}" -v GITHUB_SHA="${GITHUB_SHA}" -v MIRROR_ROOT_PATH="${MIRROR_ROOT}" "${{ env.AWK_SCRIPT_CONTENT }}" >> "$MIRROR_ROOT/index.html"

          echo "<hr><p>This content is governed by the <a href=\"LICENSE.md\">BaDaaS License</a>.</p>" >> "$MIRROR_ROOT/index.html"
          echo "</body></html>" >> "$MIRROR_ROOT/index.html"

          # --- Debugging step: List the contents of _site directory to verify structure ---
          echo "--- Contents of _site directory before upload ---"
          ls -R _site
          echo "-------------------------------------------------"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site' # Upload the entire _site directory as the artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
