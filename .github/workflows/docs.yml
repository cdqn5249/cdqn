# .github/workflows/docs.yml
name: Deploy Repo Mirror to GH-Pages

on:
  push:
    branches:
      - main # Or your alpha-test branch if you're using one
    paths-ignore: # Ignore changes to workflows themselves to prevent infinite loops
      - '.github/workflows/**'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push to gh-pages branch
      pages: write    # Required to deploy to GitHub Pages
      id-token: write # Required for OIDC authentication
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history to get all files/dirs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare documentation directory and generate index.html
        run: |
          mkdir -p _site

          # Copy all repository content to _site, excluding .git and .github/workflows
          # The webGhPages directory will be copied as part of the repo content
          rsync -av --exclude='.git' --exclude='.github/workflows' . _site/

          # Generate index.html at the root of the _site directory
          echo "<html><head><title>CDQN Repository Mirror</title><style>body{font-family:sans-serif;}</style></head><body>" > _site/index.html
          echo "<h1>CDQN Repository Mirror</h1>" >> _site/index.html
          echo "<h2>Files:</h2><ul>" >> _site/index.html

          # List files directly in the _site root
          find _site -maxdepth 1 -type f -not -name "index.html" | sort | while read -r file; do
            FILENAME=$(basename "$file")
            echo "<li><a href=\"$FILENAME\">$FILENAME</a></li>" >> _site/index.html
          done
          echo "</ul>" >> _site/index.html

          echo "<h2>Directories:</h2><ul>" >> _site/index.html
          # List directories directly in the _site root, excluding the _site itself (which is '.'),
          # and also excluding 'webGhPages' from the listing as requested.
          find _site -maxdepth 1 -type d -not -name "_site" -not -name "webGhPages" | sort | while read -r dir; do
            DIRNAME=$(basename "$dir")
            echo "<li><a href=\"$DIRNAME/\">$DIRNAME/</a></li>" >> _site/index.html
          done
          echo "</ul>" >> _site/index.html
          echo "</body></html>" >> _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site' # Upload the entire _site directory as the artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
