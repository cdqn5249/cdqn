# .github/workflows/docs.yml

name: CDQN Documentation

on:
  push:
    branches:
      - main

jobs:
  deploy_docs:
    name: Deploy Docs to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Documentation
        run: cargo doc --no-deps --all-features

      # --- NEW STEP ADDED HERE ---
      - name: Create Redirect Page
        # This creates an index.html file at the root of the docs
        # that instantly redirects the user to the correct page.
        run: echo '<meta http-equiv="refresh" content="0; url=cdqn/index.html">' > ./target/doc/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
