name: Deploy Landing Page to GH-Pages

on:
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push to gh-pages branch
      pages: write # Required to deploy to GitHub Pages
      id-token: write # Required for OIDC authentication
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare deployment directory
        run: |
          # Create the main _site directory for deployment
          mkdir -p _site

          # Copy the contents of the webGhPages directory to the root of _site.
          # This makes webGhPages/index.html the main landing page.
          cp -r webGhPages/* _site/

          # Copy the main LICENSE.md to the root of _site for easy access from the UI.
          cp LICENSE.md _site/

          # --- Debugging step: List the contents of _site directory to verify structure ---
          echo "--- Contents of _site directory before upload ---"
          ls -R _site
          echo "-------------------------------------------------"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site' # Upload the entire _site directory as the artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
