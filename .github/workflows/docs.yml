# .github/workflows/docs.yml
name: Deploy Repo Mirror to GH-Pages

on:
  push:
    branches:
      - main # Or your alpha-test branch if you're using one
    # Removed paths-ignore to auto-run on every push
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push to gh-pages branch
      pages: write    # Required to deploy to GitHub Pages
      id-token: write # Required for OIDC authentication
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history to get all files/dirs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare documentation directory and generate index.html
        run: |
          mkdir -p _site

          # Copy all repository content to _site, excluding .git and .github directories entirely
          # The webGhPages directory will be copied as part of the repo content
          rsync -av --exclude='.git' --exclude='.github' . _site/

          # --- Generate index.html for the root _site directory ---
          echo "<html><head><title>CDQN Repository Mirror</title><style>body{font-family:sans-serif;}</style></head><body>" > _site/index.html
          echo "<h1>CDQN Repository Mirror</h1>" >> _site/index.html
          echo "<h2>Files:</h2><ul>" >> _site/index.html

          # List files directly in the _site root, excluding the generated index.html
          find _site -maxdepth 1 -type f -not -name "index.html" | sort | while read -r file; do
            FILENAME=$(basename "$file")
            echo "<li><a href=\"$FILENAME\">$FILENAME</a></li>" >> _site/index.html
          done
          echo "</ul>" >> _site/index.html

          echo "<h2>Directories:</h2><ul>" >> _site/index.html
          # List directories directly in the _site root, excluding the _site itself (which is '.'),
          # and also excluding 'webGhPages' from the listing as requested.
          find _site -maxdepth 1 -type d -not -name "_site" -not -name "webGhPages" | sort | while read -r dir; do
            DIRNAME=$(basename "$dir")
            echo "<li><a href=\"$DIRNAME/\">$DIRNAME/</a></li>" >> _site/index.html
          done
          echo "</ul>" >> _site/index.html
          echo "</body></html>" >> _site/index.html

          # --- Generate index.html for all subdirectories within _site ---
          # Iterate over all directories within _site (excluding the root _site itself)
          find _site -type d -not -path "_site" | while read -r dir_path; do
            # Calculate the path relative to the _site root for display in the title
            RELATIVE_DISPLAY_PATH=$(echo "$dir_path" | sed 's/^_site\///')
            if [ -z "$RELATIVE_DISPLAY_PATH" ]; then
              RELATIVE_DISPLAY_PATH="." # Should not happen with -not -path "_site"
            fi

            echo "Generating index.html for directory: $dir_path"
            echo "<html><head><title>CDQN - $RELATIVE_DISPLAY_PATH</title><style>body{font-family:sans-serif;}</style></head><body>" > "$dir_path/index.html"
            echo "<h1>Contents of $RELATIVE_DISPLAY_PATH/</h1>" >> "$dir_path/index.html"
            echo "<h2>Files:</h2><ul>" >> "$dir_path/index.html"

            # List files in the current subdirectory
            find "$dir_path" -maxdepth 1 -type f -not -name "index.html" | sort | while read -r file_in_dir; do
              FILENAME=$(basename "$file_in_dir")
              echo "<li><a href=\"$FILENAME\">$FILENAME</a></li>" >> "$dir_path/index.html"
            done
            echo "</ul>" >> "$dir_path/index.html"

            echo "<h2>Directories:</h2><ul>" >> "$dir_path/index.html"
            # List subdirectories in the current subdirectory
            # Using -mindepth 1 to ensure we don't list the current directory itself
            find "$dir_path" -maxdepth 1 -mindepth 1 -type d | sort | while read -r subdir_in_dir; do
              SUBDIRNAME=$(basename "$subdir_in_dir")
              echo "<li><a href=\"$SUBDIRNAME/\">$SUBDIRNAME/</a></li>" >> "$dir_path/index.html"
            done
            echo "</ul>" >> "$dir_path/index.html"
            echo "<p><a href=\"../\">Back to Parent Directory</a></p>" >> "$dir_path/index.html" # Add a back link
            echo "</body></html>" >> "$dir_path/index.html"
          done

          # --- Debugging step: List the contents of _site directory to verify structure ---
          echo "--- Contents of _site directory before upload ---"
          ls -R _site
          echo "-------------------------------------------------"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site' # Upload the entire _site directory as the artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
