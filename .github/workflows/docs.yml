# .github/workflows/docs.yml

name: CDQN Documentation

on:
  push:
    branches:
      - main

jobs:
  deploy_docs:
    name: Deploy Docs to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the main branch to get our code and markdown files
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          path: main

      # 2. Check out the gh-pages branch to get existing KDU files
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: 'gh-pages'
          path: gh-pages

      # 3. Build the Rust documentation
      - name: Build Rust Documentation
        run: |
          cd main
          cargo doc --no-deps --all-features

      # 4. Unify all content into the gh-pages directory
      - name: Unify documentation content
        run: |
          # Copy the generated Rust docs into the gh-pages checkout
          cp -r main/target/doc/* gh-pages/
          # Copy the markdown files into the gh-pages checkout
          cp main/Docs/*.md gh-pages/
          cp main/README.md gh-pages/

      # 5. Generate the final index.html from the unified content
      - name: Generate Final Index Page
        run: |
          # Create the header for our new, clean index.html landing page.
          echo '<!DOCTYPE html>
          <html>
          <head>
            <title>CDQN Project Documentation</title>
            <meta charset="utf-8">
            <style>
              body { font-family: sans-serif; margin: 2em; }
              h1 { color: #333; }
              ul { list-style-type: none; padding: 0; }
              li { margin: 0.5em 0; border-left: 3px solid #0066cc; padding-left: 1em; }
              a { text-decoration: none; color: #0066cc; font-weight: bold; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>CDQN Project Index</h1>
            <ul>' > gh-pages/index.html

          # Run the generic loop on the unified gh-pages directory
          for item in gh-pages/*; do
            if [ -e "$item" ]; then
              filename=$(basename "$item")
              if [ "$filename" != "index.html" ]; then
                echo "                <li><a href=\"$filename\">$filename</a></li>" >> gh-pages/index.html
              fi
            fi
          done

          echo '              </ul>
          </body>
          </html>' >> gh-pages/index.html

      # 6. Deploy the final, unified gh-pages directory
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # We now deploy the gh-pages directory, which contains everything.
          publish_dir: ./gh-pages
          # We no longer need keep_files, as we've done the merge manually.
          keep_files: false
