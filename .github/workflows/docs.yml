# .github/workflows/docs.yml

name: CDQN Documentation

on:
  push:
    branches:
      - main

jobs:
  deploy_docs:
    name: Deploy Docs to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust Documentation
        run: cargo doc --no-deps --all-features

      # --- THIS STEP HAS BEEN CORRECTED ---
      - name: Copy Markdown Documentation
        run: |
          # Copy the root README.md to the doc root
          cp README.md ./target/doc/
          # Copy all .md files from the Docs directory into the doc root
          cp Docs/*.md ./target/doc/

      - name: Create Redirect Page
        run: echo '<meta http-equiv="refresh" content="0; url=cdqn/index.html">' > ./target/doc/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
