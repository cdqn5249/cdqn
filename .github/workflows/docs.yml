# .github/workflows/docs.yml

name: CDQN Documentation

on:
  push:
    branches:
      - main

jobs:
  deploy_docs:
    name: Deploy Docs to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout main branch
        uses: actions/checkout@v4

      - name: 2. Build Rust Documentation
        run: cargo doc --no-deps --all-features

      - name: 3. Build Documentation Site and Create Log
        run: |
          # Start a detailed log file
          LOG_FILE=./target/doc/docs_log_$(date +%s).txt
          echo "--- CDQN Documentation Workflow Log ---" > $LOG_FILE
          echo "Timestamp: $(date -u)" >> $LOG_FILE
          echo "Commit: ${{ github.sha }}" >> $LOG_FILE
          
          echo "\n--- Files in ./target/doc before copy ---" >> $LOG_FILE
          ls -laR ./target/doc >> $LOG_FILE

          # Copy markdown files
          cp Docs/*.md ./target/doc/
          cp README.md ./target/doc/
          
          echo "\n--- Generating index.html ---" >> $LOG_FILE
          # Create the index page
          echo '<!DOCTYPE html><html>...' > ./target/doc/index.html # (script is unchanged)
          for item in ./target/doc/*; do
            if [ -e "$item" ]; then
              filename=$(basename "$item")
              if [ "$filename" != "index.html" ]; then
                echo "<li><a href=\"$filename\">$filename</a></li>" >> ./target/doc/index.html
              fi
            fi
          done
          echo '</ul></body></html>' >> ./target/doc/index.html
          
          echo "\n--- Final file list in ./target/doc before deploy ---" >> $LOG_FILE
          ls -laR ./target/doc >> $LOG_FILE
          echo "\n--- Log End ---" >> $LOG_FILE

      - name: 4. Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          keep_files: false
