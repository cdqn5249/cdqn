# .github/workflows/docs.yml

name: CDQN Documentation

on:
  push:
    branches:
      - main

jobs:
  deploy_docs:
    name: Deploy Docs to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust Documentation
        run: cargo doc --no-deps --all-features

      # --- THIS STEP IS NOW MORE ROBUST ---
      - name: Copy Markdown Documentation
        run: |
          # Create a clean, dedicated directory for our markdown files
          mkdir -p ./target/doc/manual_docs
          # Copy all .md files from the Docs directory into the new directory
          cp Docs/*.md ./target/doc/manual_docs/
          # Copy the root README.md into the same directory
          cp README.md ./target/doc/manual_docs/

      # --- NEW DEBUGGING STEP ---
      # This will print the full directory tree so we can verify the file locations.
      - name: List generated files for debugging
        run: ls -R ./target/doc

      - name: Create Redirect Page
        run: echo '<meta http-equiv="refresh" content="0; url=cdqn/index.html">' > ./target/doc/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
