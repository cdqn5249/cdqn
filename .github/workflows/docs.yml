# .github/workflows/docs.yml

name: CDQN Documentation

on:
  push:
    branches:
      - main

jobs:
  deploy_docs:
    name: Deploy Docs to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust Documentation
        run: cargo doc --no-deps --all-features

      - name: Build and Organize Final Documentation Site
        run: |
          # 1. Copy all markdown files from the Docs directory into the doc root.
          cp Docs/*.md ./target/doc/
          cp README.md ./target/doc/
          
          # 2. Create the header for our new, clean index.html landing page.
          echo '<!DOCTYPE html>
          <html>
          <head>
            <title>CDQN Project Documentation</title>
            <meta charset="utf-8">
            <style>
              body { font-family: sans-serif; margin: 2em; }
              h1 { color: #333; }
              ul { list-style-type: none; padding: 0; }
              li { margin: 0.5em 0; border-left: 3px solid #0066cc; padding-left: 1em; }
              a { text-decoration: none; color: #0066cc; font-weight: bold; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>CDQN Project Index</h1>
            <ul>' > ./target/doc/index.html

          # 3. --- THIS IS THE CORRECTED, GENERIC LOOP ---
          # It iterates over ALL files and directories in the doc root.
          for item in ./target/doc/*; do
            if [ -e "$item" ]; then
              filename=$(basename "$item")
              # Add a link for every item EXCEPT for the index page itself.
              if [ "$filename" != "index.html" ]; then
                echo "                <li><a href=\"$filename\">$filename</a></li>" >> ./target/doc/index.html
              fi
            fi
          done

          # 4. Close the HTML tags.
          echo '              </ul>
          </body>
          </html>' >> ./target/doc/index.html

      - name: List generated files for debugging
        run: ls -laR ./target/doc

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          # This is still crucial to prevent this workflow from deleting the KDU files.
          keep_files: true
