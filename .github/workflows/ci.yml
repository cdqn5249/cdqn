name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  ################################################################
  # Phase 1: Code Quality Checks
  ################################################################
  code_quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # --- FIX: ADDED THIS STEP ---
      # This command explicitly downloads all external dependencies listed in all
      # Cargo.toml files. It must be run before any step that compiles code,
      # such as clippy or build. This will resolve all "unresolved import" errors.
      - name: Fetch external dependencies
        run: cargo fetch

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy Linter
        run: cargo clippy --all-targets --all-features -- -D warnings

  ################################################################
  # Phase 2: Security Audit
  ################################################################
  security_audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      
      # We fetch dependencies here as well to ensure the audit database can be built.
      - name: Fetch dependencies for audit
        run: cargo fetch

      - name: Run Security Audit
        run: cargo audit

  ################################################################
  # Phase 3: Build and Test
  ################################################################
  build_and_test:
    name: Build and Test
    needs: [code_quality, security_audit]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build project
        run: cargo build --verbose --all-features

      - name: Run tests
        run: cargo test --verbose --all-features
