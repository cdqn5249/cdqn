# File path: .github/workflows/ci.yml

name: Rust CI + GenesisCDU Report

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-v1

      - name: Build
        run: cargo build --all-targets --all-features

      - name: Run GenesisCDU smoke test and capture log
        run: |
          mkdir -p ci-logs
          echo "=== GenesisCDU Report: ${{ runner.os }} ===" > ci-logs/${{ runner.os }}.log
          echo "Rust: $(rustc --version)" >> ci-logs/${{ runner.os }}.log
          echo "OS: $(uname -a 2>/dev/null || ver 2>/dev/null)" >> ci-logs/${{ runner.os }}.log
          echo "Time: $(date -u)" >> ci-logs/${{ runner.os }}.log
          echo "---" >> ci-logs/${{ runner.os }}.log

          # Run the smoke test (will pass even if minimal)
          cargo test --lib genesis_cdu_smoke -- --exact --nocapture 2>&1 >> ci-logs/${{ runner.os }}.log || true

        shell: bash

      - name: Upload OS log
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ runner.os }}
          path: ci-logs/${{ runner.os }}.log

  deploy_logs_to_gh_pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build_and_test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Download all logs
        uses: actions/download-artifact@v4
        with:
          path: downloaded-logs
          pattern: log-*
          merge-multiple: true

      - name: Build deployment site
        run: |
          # Start with your existing webGhPages
          cp -r webGhPages _site

          # Add CI reports
          mkdir -p _site/ci-reports
          cp downloaded-logs/*.log _site/ci-reports/ 2>/dev/null || echo "No logs"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        uses: actions/deploy-pages@v4
