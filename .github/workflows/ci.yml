# File path: .github/workflows/ci.yml

name: Rust CI + GenesisCDU Report

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-v1

      - name: Build dependencies
        run: cargo build --all-targets --all-features

      - name: Run GenesisCDU test and capture output
        run: |
          # Create logs dir
          mkdir -p ci-logs

          # Run a specific test or binary that prints Genesis info
          # If no binary exists, we run a placeholder
          echo "=== GenesisCDU Build Report for ${{ runner.os }} ===" > ci-logs/${{ runner.os }}.log
          echo "Rust version: $(rustc --version)" >> ci-logs/${{ runner.os }}.log
          echo "OS: $(uname -a 2>/dev/null || ver 2>/dev/null)" >> ci-logs/${{ runner.os }}.log
          echo "Time: $(date -u)" >> ci-logs/${{ runner.os }}.log
          echo "---" >> ci-logs/${{ runner.os }}.log

          # Try to run a genesis test if it exists
          if cargo test --lib genesis_cdu_smoke -- --exact --nocapture 2>&1 >> ci-logs/${{ runner.os }}.log; then
            echo "[SUCCESS] GenesisCDU test passed" >> ci-logs/${{ runner.os }}.log
          else
            echo "[FAILURE] GenesisCDU test failed or not implemented" >> ci-logs/${{ runner.os }}.log
          fi

          # Show log in CI output for debugging
          cat ci-logs/${{ runner.os }}.log

        shell: bash

      - name: Upload OS-specific log
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ runner.os }}
          path: ci-logs/${{ runner.os }}.log

  deploy_logs_to_gh_pages:
    name: Deploy CI Logs to GitHub Pages
    runs-on: ubuntu-latest
    needs: build_and_test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Download all logs
        uses: actions/download-artifact@v4
        with:
          path: ci-downloaded-logs
          pattern: log-*
          merge-multiple: true

      - name: Prepare webGhPages directory
        run: |
          mkdir -p webGhPages/ci-reports
          cp ci-downloaded-logs/*.log webGhPages/ci-reports/ || echo "No logs found"

          # Generate a simple index.html that lists the reports
          cat > webGhPages/ci-reports/index.html <<EOF
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CDQN CI Build Reports</title>
  <style>body { font-family: monospace; padding: 20px; }</style>
</head>
<body>
  <h1>CDQN CI Build Reports</h1>
  <p>Generated on: $(date -u)</p>
  <ul>
EOF

          for f in webGhPages/ci-reports/*.log; do
            base=$(basename "$f")
            echo "    <li><a href=\"$base\">$base</a></li>" >> webGhPages/ci-reports/index.html
          done

          cat >> webGhPages/ci-reports/index.html <<EOF
  </ul>
</body>
</html>
EOF

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'webGhPages'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
