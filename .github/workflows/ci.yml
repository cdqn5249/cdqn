# File path: .github/workflows/ci.yml
name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  ################################################################
  # Phase 1: Code Quality Checks
  ################################################################
  code_quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # --- FIX: ADDED THIS STEP ---
      # This step downloads and compiles all dependencies.
      # `cargo check` is faster than `cargo build` because it doesn't produce the final executable.
      # This ensures that when Clippy runs next, all required crates are already available.
      - name: Fetch and Compile Dependencies
        run: cargo check --all-targets

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy Linter
        run: cargo clippy --all-targets -- -D warnings

  ################################################################
  # Phase 2: Security Audit
  ################################################################
  security_audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      
      # This step needs to run after dependencies are available.
      # `cargo install` doesn't fetch workspace dependencies, so we add a check.
      - name: Fetch workspace dependencies for audit
        run: cargo check --all-targets

      - name: Run Security Audit
        run: cargo audit

  ################################################################
  # Phase 3: Build and Test
  ################################################################
  build_and_test:
    name: Build and Test
    needs: [code_quality, security_audit]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build project
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose```
