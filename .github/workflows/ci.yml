name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  ################################################################
  # All jobs are now combined into one to ensure a consistent environment
  # and prevent cache mismatches between different jobs.
  ################################################################
  build_and_test:
    name: Build, Test, and Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # --- THE CRITICAL FIX ---
      # We are adding a custom 'key' to the cache action.
      # The "-v1" at the end acts as a version number for our cache.
      # If you ever have this problem again, changing it to "-v2" will force
      # the CI to create a fresh cache, solving the problem.
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-v1

      # This step is essential. It downloads and compiles all dependencies
      # before any other action needs them.
      - name: Build dependencies
        run: cargo build --all-targets --all-features

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy Linter
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-targets --all-features --verbose

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run Security Audit
        run: cargo audit
