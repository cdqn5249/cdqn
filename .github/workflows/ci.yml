# File path: .github/workflows/ci.yml

name: Rust CI + GenesisCDU Report

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-v1

      - name: Build
        run: cargo build --all-targets --all-features

      - name: Run CDU tests and capture log
        run: |
          mkdir -p ci-logs
          echo "=== GenesisCDU Report: ${{ runner.os }} ===" > ci-logs/${{ runner.os }}.log
          echo "Rust: $(rustc --version)" >> ci-logs/${{ runner.os }}.log
          echo "OS: $(uname -a 2>/dev/null || ver 2>/dev/null)" >> ci-logs/${{ runner.os }}.log
          echo "Time: $(date -u)" >> ci-logs/${{ runner.os }}.log
          echo "---" >> ci-logs/${{ runner.os }}.log

          # Run all tests in the cdu crate, capturing both stdout and stderr.
          # The `2>&1` is crucial to merge stderr into the stdout stream.
          cargo test -p cdqn-cdu -- --nocapture 2>&1 >> ci-logs/${{ runner.os }}.log || echo "[WARNING] CDU tests failed"
          
          # Use an absolute path for the report file to ensure it's found.
          REPORT_FILE="$(pwd)/ci-logs/genesis_report.txt"
          echo "DEBUG: Looking for report file at $REPORT_FILE" >> ci-logs/${{ runner.os }}.log
          
          if [ -f "$REPORT_FILE" ]; then
            echo "DEBUG: Report file found. Appending contents." >> ci-logs/${{ runner.os }}.log
            cat "$REPORT_FILE" >> ci-logs/${{ runner.os }}.log
          else
            echo "DEBUG: Report file NOT FOUND." >> ci-logs/${{ runner.os }}.log
          fi

        shell: bash

      - name: Upload OS log
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ runner.os }}
          path: ci-logs/${{ runner.os }}.log

  deploy_logs_to_gh_pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build_and_test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Download all logs
        uses: actions/download-artifact@v4
        with:
          path: downloaded-logs
          pattern: log-*
          merge-multiple: true

      - name: Build deployment site
        run: |
          cp -r webGhPages _site
          mkdir -p _site/ci-reports

          # Generate index.html using printf (YAML-safe)
          printf '%s\n' "<!DOCTYPE html>" > _site/ci-reports/index.html
          printf '%s\n' "<html>" >> _site/ci-reports/index.html
          printf '%s\n' "<head>" >> _site/ci-reports/index.html
          printf '%s\n' "  <meta charset=\"utf-8\">" >> _site/ci-reports/index.html
          printf '%s\n' "  <title>CDQN CI Reports</title>" >> _site/ci-reports/index.html
          printf '%s\n' "  <style>" >> _site/ci-reports/index.html
          printf '%s\n' "    body { font-family: monospace; padding: 20px; background: #121212; color: #e0e0e0; }" >> _site/ci-reports/index.html
          printf '%s\n' "    a { color: #bb86fc; text-decoration: none; }" >> _site/ci-reports/index.html
          printf '%s\n' "    a:hover { text-decoration: underline; }" >> _site/ci-reports/index.html
          printf '%s\n' "  </style>" >> _site/ci-reports/index.html
          printf '%s\n' "</head>" >> _site/ci-reports/index.html
          printf '%s\n' "<body>" >> _site/ci-reports/index.html
          printf '%s\n' "  <h1>CDQN CI Build Reports</h1>" >> _site/ci-reports/index.html
          printf '%s\n' "  <p>GenesisCDU build logs per operating system:</p>" >> _site/ci-reports/index.html
          printf '%s\n' "  <ul>" >> _site/ci-reports/index.html

          if ls downloaded-logs/*.log 1> /dev/null 2>&1; then
            cp downloaded-logs/*.log _site/ci-reports/
            for f in downloaded-logs/*.log; do
              base=$(basename "$f")
              printf '    <li><a href=\"%s\">%s</a></li>\n' "$base" "$base" >> _site/ci-reports/index.html
            done
          else
            printf '    <li>No build logs available yet.</li>\n' >> _site/ci-reports/index.html
          fi

          printf '%s\n' "  </ul>" >> _site/ci-reports/index.html
          printf '%s\n' "  <p><a href=\"/cdqn/\">← Back to homepage</a></p>" >> _site/ci-reports/index.html
          printf '%s\n' "</body>" >> _site/ci-reports/index.html
          printf '%s\n' "</html>" >> _site/ci-reports/index.html
          printf '%s\n' "</html>" >> _site/ci-reports/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        uses: actions/deploy-pages@v4
