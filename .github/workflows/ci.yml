# File path: .github/workflows/ci.yml
name: Rust CDQN CI

on:
  # Triggers the workflow on push or pull request events on the main branch and any feature branches
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Permissions are set to default, but good to be explicit for security
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        # You can add components here if needed, e.g., clippy, rustfmt
        components: clippy, rustfmt

    # --- 1. Syntax Check (Compilation) ---
    - name: Build (Syntax Check)
      run: cargo build --verbose

    # --- 2. Testing ---
    - name: Run Unit and Integration Tests
      run: cargo test --verbose

    # --- 3. Linting (Code Quality) ---
    - name: Run Clippy (Linter)
      run: cargo clippy --verbose -- -D warnings
      # The '-D warnings' flag treats all compiler warnings as errors, enforcing high code quality.

    # --- 4. Formatting Check ---
    - name: Check Code Formatting
      run: cargo fmt -- --check
      # The '--check' flag ensures that the code is formatted correctly and fails the CI if it is not.

    # --- Optional: Benchmarking (For performance-critical components) ---
    # - name: Run Benchmarks
    #   run: cargo bench --verbose
