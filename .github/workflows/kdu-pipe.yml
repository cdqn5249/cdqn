# .github/workflows/kdu-pipe.yml

name: CDQN KDU Pipe

on:
  workflow_dispatch:
    inputs:
      kdu_filename:
        description: 'The name of the KDU file'
        required: true
      kdu_content_base64:
        description: 'The content of the KDU, base64 encoded'
        required: true
      # --- THIS IS THE NEW, CRUCIAL INPUT ---
      github_token:
        description: 'The PAT to authorize the subsequent workflow trigger'
        required: true

jobs:
  commit_kdu:
    name: Commit KDU to gh-pages
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the gh-pages branch using the provided PAT
      # This gives the subsequent git commands the necessary authority.
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: 'gh-pages'
          token: ${{ github.event.inputs.github_token }}

      # 2. Decode and write the KDU file
      - name: Decode and write KDU file
        run: |
          echo "${{ github.event.inputs.kdu_content_base64 }}" | base64 --decode > ${{ github.event.inputs.kdu_filename }}
          echo "Created file ${{ github.event.inputs.kdu_filename }}"

      # 3. Commit the new file back to the gh-pages branch
      - name: Commit and push KDU file
        run: |
          git config --global user.name 'CDQN Pipe Bot'
          git config --global user.email 'actions@github.com'
          git add .
          git commit -m "pipe: Add ${{ github.event.inputs.kdu_filename }}"
          git push
