[package]
name = "hello-world-worker"
version = "0.1.0"
edition = "2021"
authors = ["Christophe Duy Quang Nguyen"]
description = "A simple example of a cdqn worker component."
license-file = "../LICENSE.md"
repository = "https://github.com/cdqn5249/cdqn"

[lib]
crate-type = ["cdylib"]

[dependencies]
# We no longer need wit-bindgen here; cargo-component handles it.
cdqn-types = { path = "../cdqn-types" }

# --- THIS IS THE NEW, REQUIRED SECTION ---
[package.metadata.component]
# This tells cargo-component where to find our WIT definition.
wit_path = "wit"
