[package]
name = "hello-world-worker"
version = "0.1.0"
edition = "2021"
authors = ["Christophe Duy Quang Nguyen"]
description = "A simple example of a cdqn worker component."
license-file = "../LICENSE.md"
repository = "https://github.com/cdqn5249/cdqn"

[lib]
crate-type = ["cdylib"]

[dependencies]
# The auto-generated bindings code requires the `wit-bindgen` runtime.
# This dependency provides the necessary `wit_bindgen_rt` library.
wit-bindgen = { version = "0.24.0", features = ["rt"] }

[package.metadata.component]
target = { world = "hello" }
