[package]
name = "hello-world-worker"
version = "0.1.0"
edition = "2021"
authors = ["Christophe Duy Quang Nguyen"]
description = "A simple example of a cdqn worker component."
license-file = "../LICENSE.md"
repository = "https://github.com/cdqn5249/cdqn"

[lib]
crate-type = ["cdylib"]

[dependencies]
# --- THIS IS THE DEFINITIVE FIX ---
# The auto-generated bindings code requires the `wit-bindgen` runtime.
# We provide it by depending on the crate itself, without any feature flags.
wit-bindgen = "0.24.0"

[package.metadata.component]
target = { world = "hello" }
