[package]
name = "hlc"
description = "A Hybrid Logical Clock implementation for causal ordering in the CDQN ecosystem."
# Inherits version, authors, edition, license from the workspace root Cargo.toml

[dependencies]
# The HLC needs to uniquely identify the node that creates the timestamp.
# We will use the NodeId from cryptocore for this purpose.
cryptocore = { path = "../cryptocore", workspace = true }

# We will need a way to get the physical system time.
chrono = { version = "0.4", default-features = false, features = ["serde"] }

# Inherit from workspace.
serde = { workspace = true }
