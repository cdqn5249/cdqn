[package]
name = "cdqn-hlc"
version = "0.1.0"
edition = "2021"
description = "Hybrid Logical Clock (HLC) based universal ID generator for the CDQN ecosystem"
license = "BaDaaS"
publish = false

[dependencies]
# Make serde an optional dependency, so the hlc crate remains minimal by default.
serde = { version = "1.0", features = ["derive"], optional = true }

[features]
# Define a feature named "serde" that, when enabled, pulls in the serde dependency.
# This allows crates like `cdu` to opt-in to serialization support.
serde = ["dep:serde"]
