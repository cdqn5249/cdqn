[package]
name = "cdqn-cryptocore"
version = "0.1.0"
edition = "2021"
description = "Minimal cryptographic primitives for the CDQN ecosystem: hashing, key derivation, encryption, and signatures"
license = "BaDaaS"
publish = false

[dependencies]
sha3 = "0.10"
hkdf = "0.12"
chacha20poly1305 = "0.10"
