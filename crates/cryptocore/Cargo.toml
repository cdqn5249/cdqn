[package]
name = "cryptocore"
description = "Core cryptographic functionalities for the CDQN ecosystem."
# Inherits version, authors, edition, license from the workspace root Cargo.toml

[dependencies]
# For Ed25519 digital signatures, a modern and highly-performant algorithm.
ed25519-dalek = { version = "2.1.0", features = ["serde"] }

# For SHA3-256 hashing, a secure and standardized hashing algorithm.
sha3 = "0.10.8"

# For generating cryptographically secure random numbers, required for key generation.
rand = "0.8.5"

# This dependency is inherited from the [workspace.dependencies] section
# in the root Cargo.toml, ensuring version consistency across the project.
serde = { workspace = true }
